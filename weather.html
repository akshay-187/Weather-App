<!DOCTYPE html>
<html>
  <head>
    <title>Weather </title>
    <link href="weather.css" rel="stylesheet">
  </head>
  <body>
    <div class="main-block">
      
      <div class="search">
        <input class="search-input" type="text" placeholder="Search your city" spellcheck="true">
        <button class="search-button">SEARCH</button>
      </div>
      
      <div class="show-weather">
        <img class="show-icon" src="">
        <h1 class="temperature">26<sup>o</sup>C</h1>
        <h2 class="feels">Feels like: </h2>
        <h2 class="humidity">humidity: </h2>
        <h3 class="type">CLOUDY</h3>
        <h2 class="city">LUCKNOW</h2>
        <h2 class="wind-speed">Wind: </h2>
        
      </div>
    </div>
    <script src="weather.js"></script>
  </body>
</html>
